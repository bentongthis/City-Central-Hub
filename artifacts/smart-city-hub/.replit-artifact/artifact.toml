kind = "web"
previewPath = "/"
title = "SIA 2 Smart City Hub"
version = "1.0.0"
id = "artifacts/smart-city-hub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21664

[services.development]
run = "pnpm --filter @workspace/smart-city-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-city-hub", "run", "build" ]
serve = "static"
publicDir = "artifacts/smart-city-hub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21664"
BASE_PATH = "/"
